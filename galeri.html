<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galeri Foto — Sistem Informasi Kampung Cisabaru</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="manifest" href="manifest.json">
</head>
<body>

<div class="app-shell">

  <aside class="sidebar">
    <div class="sidebar__brand">
      <div class="mark">C</div>
      <div><b>Cisabaru</b><span>Smart Village</span></div>
    </div>
    <nav class="sidebar__scroll">
      <a href="dashboard.html" class="nav-item"><i class="fa-solid fa-house"></i>Dashboard</a>
      <div class="grup-label">Data Penduduk</div>
      <a href="kk.html" class="nav-item"><i class="fa-solid fa-people-roof"></i>Data KK</a>
      <div class="grup-label">Iuran</div>
      <a href="iuran.html" class="nav-item"><i class="fa-solid fa-coins"></i>Iuran &amp; Rekap</a>
      <div class="grup-label">Kegiatan</div>
      <a href="phbn.html" class="nav-item"><i class="fa-solid fa-flag"></i>PHBN</a>
      <a href="galeri.html" class="nav-item aktif"><i class="fa-regular fa-images"></i>Galeri Foto</a>
      <div class="grup-label">Lainnya</div>
      <a href="#" class="nav-item"><i class="fa-solid fa-file-lines"></i>Surat</a>
      <a href="#" class="nav-item"><i class="fa-solid fa-chart-simple"></i>Laporan</a>
      <a href="#" class="nav-item"><i class="fa-solid fa-gear"></i>Pengaturan</a>
    </nav>
    <div class="sidebar__foot">© 2026 Kampung Cisabaru<br>RW 05, Jawa Barat</div>
  </aside>

  <div class="konten">
    <header class="topbar">
      <div class="topbar__kiri">
        <button class="tombol-menu-mobile" data-toggle-sidebar aria-label="Buka menu"><i class="fa-solid fa-bars"></i></button>
        <div class="topbar__judul">Galeri Kegiatan</div>
      </div>
      <div class="topbar__kanan">
        <button class="ikon-bulat" data-toggle-gelap aria-label="Ganti mode gelap"></button>
        <div class="profil-chip"><div class="avatar" data-inisial-pengguna>A</div><span data-nama-pengguna>Admin</span></div>
      </div>
    </header>

    <main class="konten__isi">
      <div class="panel">
        <div class="panel__head">
          <div><h3>Album Kegiatan Kampung</h3><p><span id="jumlahFoto">—</span> foto terdokumentasi</p></div>
          <button class="btn utama"><i class="fa-solid fa-upload"></i> Unggah Foto</button>
        </div>

        <div class="filter-kategori" id="filterKategori"></div>
        <div class="grid-galeri" id="grid-galeri"></div>
      </div>
    </main>
  </div>
</div>

<div class="lightbox" id="lightbox">
  <button class="lightbox__tutup" id="tutupLightbox" aria-label="Tutup"><i class="fa-solid fa-xmark"></i></button>
  <img src="" alt="" id="lightboxImg">
  <div class="lightbox__caption" id="lightboxCaption"></div>
</div>

<script src="js/app.js"></script>
<script src="js/galeri.js"></script>
</body>
</html>
