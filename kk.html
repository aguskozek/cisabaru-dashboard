<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data KK — Sistem Informasi Kampung Cisabaru</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="manifest" href="manifest.json">
</head>
<body>

<div class="app-shell">

  <aside class="sidebar">
    <div class="sidebar__brand">
      <div class="mark">C</div>
      <div><b>Cisabaru</b><span>Smart Village</span></div>
    </div>
    <nav class="sidebar__scroll">
      <a href="dashboard.html" class="nav-item"><i class="fa-solid fa-house"></i>Dashboard</a>
      <div class="grup-label">Data Penduduk</div>
      <a href="kk.html" class="nav-item aktif"><i class="fa-solid fa-people-roof"></i>Data KK</a>
      <div class="grup-label">Iuran</div>
      <a href="iuran.html" class="nav-item"><i class="fa-solid fa-coins"></i>Iuran &amp; Rekap</a>
      <div class="grup-label">Kegiatan</div>
      <a href="phbn.html" class="nav-item"><i class="fa-solid fa-flag"></i>PHBN</a>
      <a href="galeri.html" class="nav-item"><i class="fa-regular fa-images"></i>Galeri Foto</a>
      <div class="grup-label">Lainnya</div>
      <a href="#" class="nav-item"><i class="fa-solid fa-file-lines"></i>Surat</a>
      <a href="#" class="nav-item"><i class="fa-solid fa-chart-simple"></i>Laporan</a>
      <a href="#" class="nav-item"><i class="fa-solid fa-gear"></i>Pengaturan</a>
    </nav>
    <div class="sidebar__foot">© 2026 Kampung Cisabaru<br>RW 05, Jawa Barat</div>
  </aside>

  <div class="konten">
    <header class="topbar">
      <div class="topbar__kiri">
        <button class="tombol-menu-mobile" data-toggle-sidebar aria-label="Buka menu"><i class="fa-solid fa-bars"></i></button>
        <div class="topbar__judul">Data Kepala Keluarga</div>
      </div>
      <div class="topbar__kanan">
        <button class="ikon-bulat" data-toggle-gelap aria-label="Ganti mode gelap"></button>
        <button class="ikon-bulat" aria-label="Notifikasi"><i class="fa-regular fa-bell"></i></button>
        <div class="profil-chip"><div class="avatar" data-inisial-pengguna>A</div><span data-nama-pengguna>Admin</span></div>
      </div>
    </header>

    <main class="konten__isi">
      <div class="panel">
        <div class="panel__head">
          <div><h3>Daftar Kepala Keluarga</h3><p><span id="jumlahHasil">—</span> keluarga terdaftar</p></div>
          <div style="display:flex; gap:8px;">
            <button class="btn" id="btnExportPDF"><i class="fa-regular fa-file-pdf"></i> Export PDF</button>
            <button class="btn" id="btnExportExcel"><i class="fa-regular fa-file-excel"></i> Export Excel</button>
            <button class="btn utama"><i class="fa-solid fa-plus"></i> Tambah KK</button>
          </div>
        </div>

        <div class="toolbar">
          <div class="input-cari">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="cariNama" placeholder="Cari nama kepala keluarga atau nomor KK…">
          </div>
          <select class="filter" id="filterRT">
            <option value="">Semua RT</option>
            <option value="01">RT 01</option>
            <option value="02">RT 02</option>
            <option value="03">RT 03</option>
            <option value="04">RT 04</option>
          </select>
          <select class="filter" id="urutkan">
            <option value="nama">Urutkan: Nama (A-Z)</option>
            <option value="anggota">Urutkan: Jumlah Anggota</option>
            <option value="rt">Urutkan: RT</option>
          </select>
        </div>

        <div style="overflow-x:auto;">
          <table class="tabel">
            <thead>
              <tr><th>No</th><th>No. KK</th><th>Kepala Keluarga</th><th>RT/RW</th><th>Anggota</th><th>Alamat</th></tr>
            </thead>
            <tbody id="tabelKK">
              <tr><td colspan="6"><div class="skeleton" style="height:20px;"></div></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
</div>

<script src="js/app.js"></script>
<script src="js/kk.js"></script>
</body>
</html>
